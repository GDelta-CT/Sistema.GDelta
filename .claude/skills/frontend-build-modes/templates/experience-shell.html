<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- SEO + Open Graph: preencher (sem isto, reprova content no /design-review) -->
  <title><!-- título descritivo --></title>
  <meta name="description" content="<!-- 1 frase real, sem lorem -->" />
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />
  <meta property="og:image" content="" />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Fontes: display + body distintos. NUNCA Inter/Roboto/Arial como escolha estética. -->
  <!-- <link href="https://fonts.googleapis.com/css2?family=...&display=swap" rel="stylesheet" /> -->

  <style>
    /* === Design tokens (OKLCH single-hue; derive de --brand-hue) === */
    @property --brand-hue   { syntax: "<angle>";  inherits: true; initial-value: 220deg; }
    @property --brand-chroma { syntax: "<number>"; inherits: true; initial-value: 0.18; }

    :root {
      --brand-hue: 220deg;
      --brand-chroma: 0.09;     /* in-gamut p/ hue 220; ajuste por marca (ver oklch-validate.ts) */
      --color-500: oklch(0.55 var(--brand-chroma) var(--brand-hue));
      --color-900: oklch(0.15 0.03 var(--brand-hue));
      --accent-500: oklch(0.55 var(--brand-chroma) calc(var(--brand-hue) + 180deg));
      --bg: oklch(0.14 0.015 var(--brand-hue));      /* dark tintado, nunca #000 */
      --fg: oklch(0.96 0.01 var(--brand-hue));

      --text-display: clamp(3rem, 1.5rem + 8vw, 10rem);
      --text-h2: clamp(2rem, 1.4rem + 3vw, 4rem);
      --text-base: clamp(1rem, 0.95rem + 0.3vw, 1.125rem);

      --space-section: clamp(5rem, 12vh, 8rem);
      --space-content: clamp(1.5rem, 4vw, 3rem);
    }

    * { box-sizing: border-box; margin: 0; }
    body { background: var(--bg); color: var(--fg); font-size: var(--text-base); line-height: 1.6; }
    main > section { padding: var(--space-section) var(--space-content); }
    .hero { min-height: 100vh; display: grid; place-content: center; }

    /* CSS Scroll-Driven reveal (prioridade 1, zero JS) */
    @keyframes reveal { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: none; } }
    .reveal { animation: reveal linear both; animation-timeline: view(); animation-range: entry 0% entry 80%; }
    @supports not (animation-timeline: view()) { .reveal { opacity: 1; transform: none; } }

    /* prefers-reduced-motion: desliga tudo (binário, não "sutil") */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav aria-label="Principal"><!-- logo + links --></nav>
  </header>

  <main>
    <section class="hero">
      <!-- 1 heading display + 1 subtitle + 1 CTA primário + 1 mídia (Cowan 4) -->
    </section>

    <!-- Seções conforme section_plan dos tokens. Ritmo 2 dense : 1 sparse.
         Grids assimétricos (2fr 1fr 3fr). 1 elemento por seção sangra do container. -->
  </main>

  <footer>
    <!-- links, copyright -->
  </footer>

  <!-- GSAP (prioridade 2) apenas se o CSS Scroll-Driven não cobrir:
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);
    // usar scrubSection() de scroll-patterns.md — sempre scrub, sempre bidirecional
  </script>
  -->
</body>
</html>
